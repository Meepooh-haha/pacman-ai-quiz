<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacman AI Quiz 🎮</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Kanit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ── START SCREEN ── -->
  <div id="start-screen" class="screen">
    <h1>🎮 PACMAN</h1>
    <h3>AI QUIZ EDITION</h3>
    <p>
      🕹️ ควบคุม Pacman ด้วยลูกศร หรือ WASD<br>
      ⚡ กินไอเทมพลัง เพื่อรับคำถาม<br>
      ✅ ตอบถูก = กินผีได้ชั่วคราว<br>
      ❌ ตอบผิด = เสียพลัง
    </p>
    <input id="name-input" type="text" maxlength="12" placeholder="ใส่ชื่อของคุณ" autocomplete="off">
    <button id="btn-start" class="btn">▶ เริ่มเล่น</button>
    <button id="btn-lb-start" class="btn btn-outline" onclick="document.getElementById('btn-leaderboard-home').click()">🏆 ดูอันดับ</button>
  </div>

  <!-- ── LIVE SCORE ── -->
  <div id="live-score-bar">SCORE: <span id="live-score">0</span></div>

  <!-- ── CANVAS ── -->
  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- ── D-PAD ── -->
  <div id="dpad">
    <button class="dpad-btn" id="dpad-up">▲</button>
    <div class="dpad-row">
      <button class="dpad-btn" id="dpad-left">◄</button>
      <div style="width:54px"></div>
      <button class="dpad-btn" id="dpad-right">►</button>
    </div>
    <button class="dpad-btn" id="dpad-down">▼</button>
  </div>

  <!-- ── QUIZ OVERLAY ── -->
  <div id="quiz-overlay">
    <div id="quiz-box">
      <div id="quiz-header">
        <span id="quiz-label">⚡ คำถาม AI</span>
        <span id="quiz-timer">15</span>
      </div>
      <div id="timer-bar-wrap">
        <div id="timer-bar"></div>
      </div>
      <div id="quiz-question"></div>
      <div id="quiz-choices"></div>
      <div id="quiz-result"></div>
    </div>
  </div>

  <!-- ── GAME OVER SCREEN ── -->
  <div id="gameover-screen" class="screen">
    <h1>GAME OVER</h1>
    <p>คะแนนของคุณ</p>
    <div class="final-score" id="final-score">0</div>
    <button id="btn-retry" class="btn">▶ เล่นอีกครั้ง</button>
    <button id="btn-leaderboard" class="btn btn-outline">🏆 ดูอันดับ</button>
  </div>

  <!-- ── LEADERBOARD SCREEN ── -->
  <div id="leaderboard-screen" class="screen">
    <h2>🏆 TOP 100</h2>
    <div id="lb-scroll">
      <table class="lb-table">
        <thead>
          <tr>
            <th>#</th>
            <th>ชื่อ</th>
            <th style="text-align:right">คะแนน</th>
          </tr>
        </thead>
        <tbody id="lb-body">
          <tr><td colspan="3" class="lb-empty">กำลังโหลด...</td></tr>
        </tbody>
      </table>
    </div>
    <button id="btn-lb-play" class="btn">▶ เล่นเลย</button>
    <button id="btn-leaderboard-home" class="btn btn-outline" onclick="showScreen(document.getElementById('leaderboard-screen'));renderLeaderboard()">🔄 รีเฟรช</button>
  </div>

  <div id="controls-hint">↑ ↓ ← → หรือ WASD เพื่อเคลื่อนที่</div>
</div>

<!-- Supabase config — แก้ไขใน supabase-config.js -->
<script src="supabase-config.js"></script>

<!-- Game -->
<script src="game.js"></script>
</body>
</html>
